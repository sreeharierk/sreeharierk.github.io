<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreehari S — Product Manager & Founder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <main class="wrapper">
        <!-- Top Navigation Area -->
        <nav class="nav-bar">
            <div class="brand">sreehari.s</div>
            <div class="nav-controls">
                <!-- Theme toggle switcher -->
                <button id="theme-toggle" class="mono-btn" aria-label="Toggle Theme">⊙ Light</button>
            </div>
        </nav>

        <!-- Dynamic Identity Frame -->
        <header class="hero">
            <div class="hero-title">
                <h1>Sreehari S</h1>
                <span class="status-indicator">Available for Roles</span>
            </div>
            <p class="bio">
                Social entrepreneur turned product manager based in India. 3+ years combining product strategy, business development, and community-driven data solutions.
            </p>
            <div class="social-links">
                <a href="mailto:sreeharierk@gmail.com" class="link-item">Email</a>
                <a href="https://linkedin.com/in/sreeharierk" target="_blank" class="link-item">LinkedIn</a>
                <a href="https://github.com/sreeharierk" target="_blank" class="link-item">GitHub</a>
            </div>
        </header>

        <!-- Segmented Site Router Links -->
        <div class="tab-router">
            <button class="tab-link active" data-tab="work">Work</button>
            <button class="tab-link" data-tab="projects">Projects</button>
            <button class="tab-link" data-tab="writings">Writings</button>
        </div>

        <hr class="divider">

        <!-- Client-Side Views Layout Containers -->
        <div id="view-content">
            <!-- JavaScript mounts view layers explicitly inside this wrapper -->
        </div>

        <footer class="footer">
            <p class="mono-text">© 2026 Sreehari S. Built with maximum performance.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
