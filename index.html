<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreehari S — Product Manager & Founder</title>
    
    <style>
        /* -------------------------------------------------------------
           Marius-Inspired Pro UI System Variables & Reset 
           ------------------------------------------------------------- */
        :root[data-theme="light"] {
            --bg: #ffffff;
            --text-primary: #000000;
            --text-secondary: #646464;
            --border-subtle: #eaeaea;
            --accent-link: #0022ff;
            --tag-surface: #f6f6f6;
            --active-indicator: #000000;
        }

        :root[data-theme="dark"] {
            --bg: #000000;
            --text-primary: #ffffff;
            --text-secondary: #8a8a8f;
            --border-subtle: #1c1c1e;
            --accent-link: #3a7fff;
            --tag-surface: #1c1c1e;
            --active-indicator: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            /* System Font Stack used by high-end UI engineers for native speed */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            letter-spacing: -0.015em;
            padding: 80px 24px;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .layout-container {
            max-width: 620px;
            margin: 0 auto;
        }

        /* -------------------------------------------------------------
           Header & Main Nav Area Layout
           ------------------------------------------------------------- */
        .navigation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 56px;
        }

        .site-signature {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: -0.02em;
        }

        .utility-btn {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
            font-size: 0.75rem;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .utility-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        /* -------------------------------------------------------------
           Identity Hero Module
           ------------------------------------------------------------- */
        .profile-hero {
            margin-bottom: 48px;
        }

        .identity-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.035em;
            color: var(--text-primary);
        }

        .status-badge {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
            font-size: 0.68rem;
            color: var(--text-secondary);
            background: var(--tag-surface);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
        }

        .profile-bio {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 400;
        }

        .interactive-links-row {
            display: flex;
            gap: 16px;
        }

        .clean-anchor {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 1px;
            transition: color 0.2s, border-color 0.2s;
        }

        .clean-anchor:hover {
            color: var(--accent-link);
            border-color: var(--accent-link);
        }

        /* -------------------------------------------------------------
           Astro-Inspired Custom Tab Router Layout
           ------------------------------------------------------------- */
        .navigation-tabs-wrapper {
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 36px;
        }

        .tab-layout-row {
            display: flex;
            gap: 4px;
            margin-bottom: -1px;
        }

        .tab-trigger-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.92rem;
            font-weight: 500;
            padding: 8px 12px;
            cursor: pointer;
            position: relative;
            font-family: inherit;
            letter-spacing: inherit;
        }

        .tab-trigger-btn.active-tab {
            color: var(--text-primary);
            font-weight: 600;
        }

        .tab-trigger-btn.active-tab::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 12px;
            right: 12px;
            height: 1px;
            background-color: var(--active-indicator);
        }

        /* -------------------------------------------------------------
           Dynamic Grid Engine Components
           ------------------------------------------------------------- */
        .split-grid-view {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 40px;
        }

        @media (max-width: 640px) {
            .split-grid-view { grid-template-columns: 1fr; gap: 36px; }
            body { padding: 40px 16px; }
        }

        .column-headline-mono {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modular-stack {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .experience-node-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .bold-node-title {
            font-size: 0.98rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .mono-timestamp {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
            font-size: 0.76rem;
            color: var(--text-secondary);
        }

        .node-subtitle-muted {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .minimal-bullet-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .minimal-bullet-list li {
            font-size: 0.9rem;
            color: var(--text-secondary);
            position: relative;
            padding-left: 14px;
        }

        .minimal-bullet-list li::before {
            content: "·";
            position: absolute;
            left: 0;
            color: var(--text-primary);
            font-weight: 700;
        }

        /* -------------------------------------------------------------
           Premium Custom Embedded Items Styles
           ------------------------------------------------------------- */
        .interactive-showcase-box {
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border-subtle);
            padding: 20px;
            border-radius: 6px;
            transition: background-color 0.1s ease, border-color 0.1s ease;
            margin-bottom: 12px;
        }

        .interactive-showcase-box:hover {
            background-color: var(--hover-bg);
            border-color: var(--text-primary);
        }

        .inline-text-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--text-secondary);
        }

        .inline-text-link:hover {
            color: var(--accent-link);
            border-color: var(--accent-link);
        }

        /* HIGH PERFORMANCE HORIZONTAL IMAGE SLIDER */
        .horizontal-slider-frame {
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
            margin: 12px 0;
            scrollbar-width: none;
        }
        .horizontal-slider-frame::-webkit-scrollbar { display: none; }
        .slider-flex-track { display: flex; }
        .slider-image-element {
            width: 100%;
            flex-shrink: 0;
            scroll-snap-align: start;
            object-fit: cover;
            aspect-ratio: 16 / 9;
            background: var(--tag-surface);
        }

        .system-footer {
            margin-top: 72px;
            border-top: 1px solid var(--border-subtle);
            padding-top: 20px;
        }

        .footer-mono-text {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <main class="layout-container">
        <!-- Main Top Bar Nav Module -->
        <nav class="navigation-row">
            <div class="site-signature">sreehari.s</div>
            <div class="navigation-controls">
                <button id="theme-toggle" class="utility-btn" aria-label="Toggle System UI Color">Light</button>
            </div>
        </nav>

        <!-- Core Profile Branding Layer -->
        <header class="profile-hero">
            <div class="identity-header">
                <h1>Sreehari S</h1>
                <span class="status-badge">2026</span>
            </div>
            <p class="profile-bio">
                Social entrepreneur turned product manager based in India[cite: 1]. 3+ years combining product strategy, business development, and community-driven data solutions[cite: 1].
            </p>
            <div class="interactive-links-row">
                <a href="mailto:sreeharierk@gmail.com" class="clean-anchor">Email</a>
                <a href="https://linkedin.com/in/sreeharierk" target="_blank" class="clean-anchor">LinkedIn</a>
                <a href="https://github.com/sreeharierk" target="_blank" class="clean-anchor">GitHub</a>
            </div>
        </header>

        <!-- Dynamic View Router Navigation Segment -->
        <div class="navigation-tabs-wrapper">
            <div class="tab-layout-row">
                <button class="tab-trigger-btn active-tab" data-tab="work">Work</button>
                <button class="tab-trigger-btn" data-tab="projects">Projects</button>
                <button class="tab-trigger-btn" data-tab="writings">Writings</button>
            </div>
        </div>

        <!-- System Routing Mount Node -->
        <div id="view-content"></div>

        <!-- Base Layout Info Footer -->
        <footer class="system-footer">
            <p class="footer-mono-text">Last updated: July 2026</p>
        </footer>
    </main>

    <script>
        // High Quality Managed Resume Structures Layer
        const workHistory = [
            {
                role: "Product Manager",
                company: "SectorQube",
                date: "2024 — 2025",
                bullets: [
                    "Designed QC & Technician applications, boosting operational visibility and cutting core system bugs by 30%[cite: 1].",
                    "Developed unified SOPs for installation, maintenance, and assembly, reducing factory floor production delays by 20%[cite: 1].",
                    "Built ML model components optimized for intrusion detection (92% accuracy) and predictive hardware analytics[cite: 1]."
                ]
            },
            {
                role: "Founder",
                company: "Bitnut Technologies",
                date: "2021 — 2024",
                bullets: [
                    "Conducted over 100 customer interviews to validate high-durability telecommunication platforms[cite: 1].",
                    "Developed Asturlab, a custom long-range hardware radio network with integrated hardware encryption layers[cite: 1]."
                ]
            }
        ];

        const projectRecords = [
            {
                title: "NDSM Stress Tech Anomaly Detector",
                desc: "Neurofeedback instrumentation using BioAmp processing blocks to dynamically trigger auditory feedback arrays based on raw biometric trends[cite: 1].",
                images: ["pic1.jpg", "pic2.jpg"], 
                link: "https://github.com/sreeharierk"
            },
            {
                title: "RGPR Landslide Mapping Radar",
                desc: "Convolutional neural network mapping tools engineered to scan subsurface Ground Penetrating Radar data for anomalies during natural disaster operations[cite: 1].",
                images: ["pic3.jpg"],
                link: "https://github.com/sreeharierk"
            }
        ];

        const academicProfile = {
            degree: "B.Tech, Electronics & Communication",
            college: "NSS College of Engineering",
            period: "2018 — 2022",
            details: "Student Council Association Chairperson (ELACSTA) & Institution's Innovation Coordinator[cite: 1]."
        };

        function renderWorkTemplate() {
            let workHTML = '';
            for (let i = 0; i < workHistory.length; i++) {
                const item = workHistory[i];
                let bulletsHTML = '';
                for (let j = 0; j < item.bullets.length; j++) {
                    bulletsHTML += '<li>' + item.bullets[j] + '</li>';
                }
                workHTML += `
                    <div>
                        <div class="experience-node-header">
                            <h3 class="bold-node-title">${item.role}</h3>
                            <span class="mono-timestamp">${item.date}</span>
                        </div>
                        <div class="node-subtitle-muted">${item.company}</div>
                        <ul class="minimal-bullet-list">${bulletsHTML}</ul>
                    </div>
                `;
            }

            return `
                <a href="Sreehari_S_FlowCV_Resume_2026-07-02.pdf" target="_blank" class="interactive-showcase-box">
                    <div class="experience-node-header">
                        <h3 class="bold-node-title">View Verified Resume PDF ↗</h3>
                        <span class="mono-timestamp">PDF Document</span>
                    </div>
                    <p class="node-subtitle-muted" style="margin-top: 4px; margin-bottom: 0; font-size: 0.88rem;">Click to pull the full professional dossier sheet.</p>
                </a>
                
                <div class="split-grid-view" style="margin-top: 36px;">
                    <div>
                        <h2 class="column-headline-mono">Experience</h2>
                        <div class="modular-stack">${workHTML}</div>
                    </div>
                    <div>
                        <h2 class="column-headline-mono">Education</h2>
                        <div class="modular-stack">
                            <div>
                                <div class="experience-node-header">
                                    <h3 class="bold-node-title" style="font-size: 0.95rem;">${academicProfile.degree}</h3>
                                    <span class="mono-timestamp">${academicProfile.period}</span>
                                </div>
                                <div class="node-subtitle-muted" style="margin-bottom: 2px;">${academicProfile.college}</div>
                                <p class="node-subtitle-muted" style="font-size: 0.84rem; font-style: italic;">${academicProfile.details}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProjectsTemplate() {
            let projectsHTML = '';
            for (let i = 0; i < projectRecords.length; i++) {
                const proj = projectRecords[i];
                let imagesHTML = '';
                for (let j = 0; j < proj.images.length; j++) {
                    imagesHTML += `<img src="${proj.images[j]}" alt="Portfolio Slider Resource" class="slider-image-element">`;
                }

                projectsHTML += `
                    <div class="interactive-showcase-box" style="margin-bottom: 24px;">
                        <div class="experience-node-header">
                            <h3 class="bold-node-title">${proj.title}</h3>
                            <a href="${proj.link}" target="_blank" class="mono-timestamp inline-text-link">Repository ↗</a>
                        </div>
                        <p class="node-subtitle-muted" style="margin: 4px 0 12px 0; font-size: 0.9rem;">${proj.desc}</p>
                        
                        <div class="horizontal-slider-frame">
                            <div class="slider-flex-track">${imagesHTML}</div>
                        </div>
                    </div>
                `;
            }
            return `
                <h2 class="column-headline-mono">Engineering Components</h2>
                <div class="modular-stack">${projectsHTML}</div>
            `;
        }

        function renderWritingsTemplate() {
            return `
                <h2 class="column-headline-mono">Publications</h2>
                <div class="interactive-showcase-box">
                    <h3 class="bold-node-title">Systems Architecture Case: Bitnut Network Deployments</h3>
                    <p class="node-subtitle-muted" style="margin-top: 4px; font-size: 0.9rem;">Exploring low-power, localized system tracking configurations. Full open research guidelines mapped on my main <a href="https://github.com/sreeharierk" target="_blank" class="inline-text-link">GitHub Profile</a>.</p>
                </div>
            `;
        }

        function mountTargetView(viewKey) {
            const viewport = document.getElementById('view-content');
            if (!viewport) return;

            if (viewKey === 'work') viewport.innerHTML = renderWorkTemplate();
            if (viewKey === 'projects') viewport.innerHTML = renderProjectsTemplate();
            if (viewKey === 'writings') viewport.innerHTML = renderWritingsTemplate();

            const triggers = document.querySelectorAll('.tab-trigger-btn');
            for (let i = 0; i < triggers.length; i++) {
                if (triggers[i].getAttribute('data-tab') === viewKey) {
                    triggers[i].classList.add('active-tab');
                } else {
                    triggers[i].classList.remove('active-tab');
                }
            }
        }

        function initializeThemeLayer() {
            const toggle = document.getElementById('theme-toggle');
            if (!toggle) return;

            const persistentTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', persistentTheme);
            toggle.textContent = persistentTheme === 'light' ? 'Light' : 'Dark';

            toggle.addEventListener('click', function() {
                const activeTheme = document.documentElement.getAttribute('data-theme');
                const updateTheme = activeTheme === 'light' ? 'dark' : 'light';
                
                document.documentElement.setAttribute('data-theme', updateTheme);
                toggle.textContent = updateTheme === 'light' ? 'Light' : 'Dark';
                localStorage.setItem('theme', updateTheme);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeThemeLayer();
            mountTargetView('work');

            const links = document.querySelectorAll('.tab-trigger-btn');
            for (let i = 0; i < links.length; i++) {
                links[i].addEventListener('click', function(e) {
                    const target = e.target.getAttribute('data-tab');
                    mountTargetView(target);
                });
            }
        });
    </script>
</body>
</html>
