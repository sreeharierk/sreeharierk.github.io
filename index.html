<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreehari S — Product Manager & Founder</title>
    
    <style>
        /* -------------------------------------------------------------
           Charitra Jain Inspired Colorway, Shadow Maps & Base Specs
           ------------------------------------------------------------- */
        :root[data-theme="light"] {
            --bg: #faf7f2;               /* Signature soft warm cream background */
            --text-primary: #1c1917;     /* Deep stone/charcoal text */
            --text-secondary: #686256;   /* Warm muted earth tone for subtitles */
            --card-surface: #ffffff;     /* Clean white surfaces for containers */
            --border-clean: #ebd9c3;     /* Muted cream/gold border tracks */
            --shadow-soft: 0 4px 20px -2px rgba(40, 32, 20, 0.04), 0 2px 6px -1px rgba(40, 32, 20, 0.02);
            --accent: #d97706;           /* Amber/gold minimal interactive accents */
            --tag-bg: #f5f0e6;           /* Editorial tag chip surface */
            --neon-teal: #00f2fe;        /* Blazing neon teal for light mode headings */
            --neon-teal-glow: 0 0 10px rgba(0, 242, 254, 0.6), 0 0 20px rgba(0, 242, 254, 0.3);
        }

        :root[data-theme="dark"] {
            --bg: #121110;               /* Rich obsidian deep-charcoal tone */
            --text-primary: #f4f4f0;     /* Warm white text core */
            --text-secondary: #999388;   /* Soft slate-gray variant */
            --card-surface: #1a1917;     /* Off-black raised panel cards */
            --border-clean: #2d2a26;     /* Low-contrast dark containment tracks */
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.2);
            --accent: #f59e0b;
            --tag-bg: #242220;
            --neon-teal: #00f2fe;        /* Electric neon teal stays vibrant in dark mode */
            --neon-teal-glow: 0 0 12px rgba(0, 242, 254, 0.8), 0 0 25px rgba(0, 242, 254, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            letter-spacing: -0.01em;
            padding: 90px 24px;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .canvas-layout {
            max-width: 660px;
            margin: 0 auto;
        }

        /* -------------------------------------------------------------
           Header Framework & Interactive Theme Controls
           ------------------------------------------------------------- */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 72px;
        }

        .site-mark {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .theme-toggle-btn {
            background: var(--card-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-clean);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 100px;
            box-shadow: var(--shadow-soft);
            cursor: pointer;
            transition: transform 0.1s ease, border-color 0.2s;
        }

        .theme-toggle-btn:hover {
            border-color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* -------------------------------------------------------------
           Branded Identity Bio Module with Typing Effects
           ------------------------------------------------------------- */
        .intro-hero {
            margin-bottom: 56px;
        }

        .identity-line {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        /* Neon Teal Typing Heading */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--neon-teal);
            text-shadow: var(--neon-teal-glow);
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid var(--text-primary); /* Typing blinking cursor */
            width: 0;
            animation: typingMain 2s steps(10, end) forwards, blinkCursor 0.75s step-end infinite;
        }

        .pill-tag {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--tag-bg);
            padding: 3px 10px;
            border-radius: 100px;
            border: 1px solid var(--border-clean);
        }

        .profile-bio-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 24px;
            letter-spacing: -0.015em;
        }

        .directory-links {
            display: flex;
            gap: 20px;
        }

        .editorial-anchor {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.92rem;
            border-bottom: 2px solid var(--border-clean);
            padding-bottom: 2px;
            transition: color 0.15s, border-color 0.15s;
        }

        .editorial-anchor:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* -------------------------------------------------------------
           Tab Layout Routing Framework
           ------------------------------------------------------------- */
        .tabs-menu-container {
            border-bottom: 1px solid var(--border-clean);
            margin-bottom: 40px;
        }

        .tabs-inner-flex {
            display: flex;
            gap: 8px;
            margin-bottom: -1px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px 16px;
            cursor: pointer;
            position: relative;
            font-family: inherit;
        }

        .tab-btn.tab-active {
            color: var(--text-primary);
            font-weight: 700;
        }

        .tab-btn.tab-active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--text-primary);
        }

        /* -------------------------------------------------------------
           Dynamic Grid Layout Structure Panels
           ------------------------------------------------------------- */
        .split-dashboard-grid {
            display: grid;
            grid-template-columns: 1.35fr 1fr;
            gap: 40px;
        }

        @media (max-width: 640px) {
            .split-dashboard-grid { grid-template-columns: 1fr; gap: 40px; }
            body { padding: 50px 16px; }
            h1 { font-size: 1.8rem; }
        }

        /* Neon Teal Tab Headings with custom trigger width layout definitions */
        .section-label-mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--neon-teal);
            text-shadow: var(--neon-teal-glow);
            letter-spacing: 0.08em;
            margin-bottom: 24px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid var(--text-secondary);
            width: 0;
            animation: typingSection 1.2s steps(15, end) forwards;
        }

        .vertical-layout-stack {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Charitra-Inspired Card Design Frame */
        .editorial-card {
            background-color: var(--card-surface);
            border: 1px solid var(--border-clean);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.2s;
        }

        .editorial-card:hover {
            transform: translateY(-2px);
            border-color: var(--neon-teal);
        }

        .card-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .card-bold-header {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .card-mono-timestamp {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-subtitle-subtle {
            font-size: 0.92rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .card-custom-bullets {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-custom-bullets li {
            font-size: 0.9rem;
            color: var(--text-secondary);
            position: relative;
            padding-left: 16px;
            line-height: 1.5;
        }

        .card-custom-bullets li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        /* Horizontal Widescreen Image Slider */
        .slider-frame-wrapper {
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border-radius: 8px;
            border: 1px solid var(--border-clean);
            margin-top: 14px;
            scrollbar-width: none;
        }
        .slider-frame-wrapper::-webkit-scrollbar { display: none; }
        .slider-internal-track { display: flex; }
        .slider-image-node {
            width: 100%;
            flex-shrink: 0;
            scroll-snap-align: start;
            object-fit: cover;
            aspect-ratio: 16 / 9;
            background: var(--tag-bg);
        }

        .anchor-card-wrapper {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .site-footer {
            margin-top: 88px;
            border-top: 1px solid var(--border-clean);
            padding-top: 24px;
            display: flex;
            justify-content: space-between;
        }

        .footer-text-mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* -------------------------------------------------------------
           Typing Engine Core Dynamic Keyframes
           ------------------------------------------------------------- */
        @keyframes typingMain {
            from { width: 0; }
            to { width: 200px; } /* Fits the structural width layout of "Sreehari S" */
        }

        @keyframes typingSection {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent; }
            50% { border-color: var(--text-primary); }
        }
    </style>
</head>
<body>

    <main class="canvas-layout">
        <!-- Top App Navigation Module -->
        <nav class="top-navbar">
            <div class="site-mark">Sreehari S.</div>
            <div>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Switch UI Theme">Mode</button>
            </div>
        </nav>

        <!-- Main Bio Frame Element -->
        <header class="intro-hero">
            <div class="identity-line">
                <h1>Sreehari S</h1>
                <span class="pill-tag">Product</span>
            </div>
            <p class="profile-bio-text">
                Social entrepreneur turned product manager based in India[cite: 1]. Specializing in scaling product strategies, optimizing hardware visibility, and deploying data frameworks[cite: 1].
            </p>
            <div class="directory-links">
                <a href="mailto:sreeharierk@gmail.com" class="editorial-anchor">Email</a>
                <a href="https://linkedin.com/in/sreeharierk" target="_blank" class="editorial-anchor">LinkedIn</a>
                <a href="https://github.com/sreeharierk" target="_blank" class="editorial-anchor">GitHub</a>
            </div>
        </header>

        <!-- Tabbed Router UI Navigation Menu -->
        <div class="tabs-menu-container">
            <div class="tabs-inner-flex">
                <button class="tab-btn tab-active" data-tab="work">Work</button>
                <button class="tab-btn" data-tab="projects">Projects</button>
                <button class="tab-btn" data-tab="writings">Writings</button>
            </div>
        </div>

        <!-- System Target Content Node Container -->
        <div id="view-content"></div>

        <!-- Global Site Footer Information Block -->
        <footer class="site-footer">
            <p class="footer-text-mono">Portfolio Index — 2026</p>
            <p class="footer-text-mono">Kochi, IN</p>
        </footer>
    </main>

    <script>
        // Resume Structural Configuration Data Arrays
        const professionalHistory = [
            {
                role: "Product Manager",
                company: "SectorQube",
                date: "2024 — 2025",
                bullets: [
                    "Designed QC & Technician apps, boosting visibility and cutting bugs by 30%[cite: 1].",
                    "Developed corporate SOPs, reducing production errors and delays by 20%[cite: 1].",
                    "Built ML classification structures achieving up to 92% analytical accuracy profiles[cite: 1]."
                ]
            },
            {
                role: "Founder",
                company: "Bitnut Technologies",
                date: "2021 — 2024",
                bullets: [
                    "Executed thorough competitor matrix research to slash operational burn rates by 50%[cite: 1].",
                    "Engineered Asturlab: a long-range, hardware-encrypted radio transmission system[cite: 1]."
                ]
            }
        ];

        const customProjectRecords = [
            {
                title: "Neurofeedback Stress Framework (NDSM)",
                desc: "BioAmp hardware instrumentation capturing raw EEG waves processed via deep learning logic to handle real-time anxiety management applications[cite: 1].",
                images: ["pic1.jpg", "pic2.jpg"], 
                repo: "https://github.com/sreeharierk"
            },
            {
                title: "Subsurface Radar Machine Vision (RGPR)",
                desc: "Convolutional neural network tools deployed to parse Ground Penetrating Radar data to locate survivors under soil during landslide[cite: 1].",
                images: ["pic3.jpg"],
                repo: "https://github.com/sreeharierk"
            }
        ];

        const educationalBackground = {
            degree: "B.Tech, Electronics & Communication",
            school: "NSS College of Engineering",
            timeline: "2018 — 2022",
            summary: "Elected Student Body Association Chairperson & Innovation Council Coordinator[cite: 1]."
        };

        // Component Assembly Render Framework Routine
        function viewAssemblerWork() {
            let jobsCards = '';
            for (let i = 0; i < professionalHistory.length; i++) {
                const job = professionalHistory[i];
                let points = '';
                for (let j = 0; j < job.bullets.length; j++) {
                    points += '<li>' + job.bullets[j] + '</li>';
                }
                jobsCards += `
                    <div class="editorial-card">
                        <div class="card-meta-row">
                            <h3 class="card-bold-header">${job.role}</h3>
                            <span class="card-mono-timestamp">${job.date}</span>
                        </div>
                        <div class="card-subtitle-subtle">${job.company}</div>
                        <ul class="card-custom-bullets">${points}</ul>
                    </div>
                `;
            }

            return `
                <a href="Sreehari_S_FlowCV_Resume_2026-07-02.pdf" target="_blank" class="anchor-card-wrapper">
                    <div class="editorial-card" style="border-color: var(--accent); margin-bottom: 32px;">
                        <div class="card-meta-row">
                            <h3 class="card-bold-header" style="color: var(--accent);">Download Full Dossier Resume ↗</h3>
                            <span class="card-mono-timestamp">PDF File</span>
                        </div>
                        <p class="card-subtitle-subtle" style="margin-bottom:0; font-size: 0.88rem;">Access complete structural information print out sheets verified.</p>
                    </div>
                </a>
                
                <div class="split-dashboard-grid">
                    <div>
                        <h2 class="section-label-mono">Experience</h2>
                        <div class="vertical-layout-stack">${jobsCards}</div>
                    </div>
                    <div>
                        <h2 class="section-label-mono">Education</h2>
                        <div class="vertical-layout-stack">
                            <div class="editorial-card">
                                <div class="card-meta-row">
                                    <h3 class="card-bold-header" style="font-size: 0.95rem;">${educationalBackground.degree}</h3>
                                    <span class="card-mono-timestamp">${educationalBackground.timeline}</span>
                                </div>
                                <div class="card-subtitle-subtle" style="margin-bottom: 6px;">${educationalBackground.school}</div>
                                <p class="card-subtitle-subtle" style="font-size: 0.84rem; margin-bottom: 0; font-style: italic;">${educationalBackground.summary}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function viewAssemblerProjects() {
            let dynamicProjectsHTML = '';
            for (let i = 0; i < customProjectRecords.length; i++) {
                const item = customProjectRecords[i];
                let trackingTracks = '';
                for (let j = 0; j < item.images.length; j++) {
                    trackingTracks += `<img src="${item.images[j]}" alt="Project Slide Element" class="slider-image-node">`;
                }

                dynamicProjectsHTML += `
                    <div class="editorial-card">
                        <div class="card-meta-row">
                            <h3 class="card-bold-header">${item.title}</h3>
                            <a href="${item.repo}" target="_blank" class="card-mono-timestamp editorial-anchor">Repository ↗</a>
                        </div>
                        <p class="card-subtitle-subtle" style="margin-top: 4px; margin-bottom: 12px; font-size: 0.92rem;">${item.desc}</p>
                        
                        <div class="slider-frame-wrapper">
                            <div class="slider-internal-track">${trackingTracks}</div>
                        </div>
                    </div>
                `;
            }
            return `
                <h2 class="section-label-mono">Engineering Components</h2>
                <div class="vertical-layout-stack">${dynamicProjectsHTML}</div>
            `;
        }

        function viewAssemblerWritings() {
            return `
                <h2 class="section-label-mono">Open Research Log</h2>
                <div class="editorial-card">
                    <h3 class="card-bold-header">Asturlab Link Configurations: System Telemetry Study</h3>
                    <p class="card-subtitle-subtle" style="margin-top: 6px; font-size: 0.92rem; margin-bottom: 0;">
                        Deconstructed metrics surrounding encrypted radio layouts running over edge environments. Code arrays pushed directly inside my central <a href="https://github.com/sreeharierk" target="_blank" class="editorial-anchor" style="font-weight:700;">GitHub Account</a>.
                    </p>
                </div>
            `;
        }

        function executeViewTransition(tabKey) {
            const viewport = document.getElementById('view-content');
            if (!viewport) return;

            if (tabKey === 'work') viewport.innerHTML = viewAssemblerWork();
            if (tabKey === 'projects') viewport.innerHTML = viewAssemblerProjects();
            if (tabKey === 'writings') viewport.innerHTML = viewAssemblerWritings();

            const elementButtons = document.querySelectorAll('.tab-btn');
            for (let i = 0; i < elementButtons.length; i++) {
                if (elementButtons[i].getAttribute('data-tab') === tabKey) {
                    elementButtons[i].classList.add('tab-active');
                } else {
                    elementButtons[i].classList.remove('tab-active');
                }
            }
        }

        function orchestrateThemeSystem() {
            const button = document.getElementById('theme-toggle');
            if (!button) return;

            const trackingCache = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', trackingCache);
            button.textContent = trackingCache === 'light' ? 'Cream' : 'Obsidian';

            button.addEventListener('click', function() {
                const current = document.documentElement.getAttribute('data-theme');
                const switchTarget = current === 'light' ? 'dark' : 'light';
                
                document.documentElement.setAttribute('data-theme', switchTarget);
                button.textContent = switchTarget === 'light' ? 'Cream' : 'Obsidian';
                localStorage.setItem('theme', switchTarget);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            orchestrateThemeSystem();
            executeViewTransition('work');

            const navigators = document.querySelectorAll('.tab-btn');
            for (let i = 0; i < navigators.length; i++) {
                navigators[i].addEventListener('click', function(event) {
                    const viewID = event.target.getAttribute('data-tab');
                    executeViewTransition(viewID);
                });
            }
        });
    </script>
</body>
</html>
